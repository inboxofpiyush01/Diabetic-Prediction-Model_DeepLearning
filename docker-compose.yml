services:
  diabetic-prediction-model_deeplearning-main:
    build:
      context: .
      args:
        APP_PORT: ${PORT:-8501}
    container_name: diabetic-prediction-model_deeplearning-main-app
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8501}
    ports:
      - "127.0.0.1:${HOST_PORT:-8501}:${PORT:-8501}"
